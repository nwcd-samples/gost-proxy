# Gost 配置文件
# 文档: https://gost.run/

# API 配置 - 供 Web UI 连接
api:
  addr: :18080
  pathPrefix: /api
  accessLog: true
  auth:
    username: admin
    password: changeMe!2024

# 日志配置
log:
  level: info
  format: json

# 服务配置
services:
  # HTTP 代理（支持 HTTP CONNECT 隧道，适用于 Kiro IDE）
  - name: http-proxy
    addr: :8080
    handler:
      type: http
      auths:
        - username: user1
          password: pass123
        - username: user2
          password: pass456
    listener:
      type: tcp
      metadata:
        readTimeout: 300s
        writeTimeout: 300s
