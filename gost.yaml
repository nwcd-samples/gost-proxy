# Gost 配置文件
# 文档: https://gost.run/

# API 配置 - 供 Web UI 连接
api:
  addr: :18080
  pathPrefix: /api
  accessLog: true
  auth:
    username: admin
    password: changeMe!2024

# 日志配置
log:
  level: info
  format: json

# 服务配置
services:
  # HTTP 代理（支持 HTTP CONNECT 隧道，适用于 Kiro IDE）
  - name: http-proxy
    addr: :8080
    handler:
      type: http
      # 启用持久连接，避免客户端复用空闲连接时报 socket 连接失败
      keepalive: true
      # 读超时放到 handler 下才生效（默认仅 15s，对长连接太短）
      readTimeout: 300s
      auths:
        - username: user1
          password: pass123
        - username: user2
          password: pass456
    listener:
      type: tcp
